name: Sync from upstream

# Pull the latest scraper/dashboard improvements from the source template repo.
# Uses REBASE (not merge) so the fork stays "N commits ahead, 0 behind":
#   • GitHub's "Sync fork" button then does a clean fast-forward and never
#     shows the confusing "Discard N commits" prompt.
#   • config.json, scoring_profile.json, and output/ are gitignored upstream
#     so they are never present in upstream commits; rebasing replays your
#     commits on top of upstream without touching your personal files.
# -X ours auto-resolves any conflict by keeping this fork's version.
#
# UPSTREAM SOURCE: https://github.com/ScottCoffin/Job_Scraper
# Do NOT point this at your own personal fork.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC — weekly check for improvements
  workflow_dispatch:        # or run manually any time via Actions tab

jobs:
  sync:
    name: Rebase onto upstream code improvements
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebase onto upstream
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git remote add upstream https://github.com/ScottCoffin/Job_Scraper.git
          git fetch upstream main

          # Rebase this fork's commits on top of upstream/main. After the
          # force-push the fork is "ahead only" — no more diverged-branch
          # warnings. -X ours auto-resolves conflicts in this fork's favour
          # (should never trigger for config.json/scoring_profile.json since
          # those files don't exist in upstream at all).
          if git rebase upstream/main -X ours; then
            git push --force-with-lease origin main
          else
            # Rebase failed despite -X ours (extremely unlikely). Fall back to
            # a merge so the workflow doesn't error silently.
            git rebase --abort
            echo "⚠️  rebase failed; falling back to merge"
            git merge upstream/main --no-edit -X ours \
              -m "chore: sync from upstream [$(date -u '+%Y-%m-%d')]"
            git push origin main
          fi
          echo "✅ Synced successfully."
